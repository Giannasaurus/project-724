<div id="editResidentView">
    <div class="subview-heading">
        <span class="back-btn">&lt; Back</span>
        <div>
            <h2 id="editResident__header">Edit Resident</h2>
            <p class="form-reference">Record of Barangay Inhabitants (Form C)</p>
        </div>
    </div>
    <form id="addResidentForm" novalidate>
        <section class="resident-form-section">
            <h3>Barangay Inhabitants Record</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>First Name <span class="required">*</span></label>
                    <input type="text" id="ar-firstName" required>
                </div>
                <div class="form-group">
                    <label>Middle Name <span class="required">*</span></label>
                    <input type="text" id="ar-middleName" required>
                </div>
                <div class="form-group">
                    <label>Surname <span class="required">*</span></label>
                    <input type="text" id="ar-lastName" required>
                </div>
                <div class="form-group form-group--sm">
                    <label>Suffix</label>
                    <input type="text" id="ar-suffix">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group form-group--birthdate">
                    <label>Date of Birth <span class="required">*</span></label>
                    <div class="birthdate-inputs">
                        <input type="number" id="ar-bday" placeholder="DD" min="1" max="31">
                        <select id="ar-bmonth">
                            <option value="1">Jan</option>
                            <option value="2">Feb</option>
                            <option value="3">Mar</option>
                            <option value="4">Apr</option>
                            <option value="5">May</option>
                            <option value="6">Jun</option>
                            <option value="7">Jul</option>
                            <option value="8">Aug</option>
                            <option value="9">Sep</option>
                            <option value="10">Oct</option>
                            <option value="11">Nov</option>
                            <option value="12">Dec</option>
                        </select>
                        <input type="number" id="ar-byear" placeholder="YYYY" min="1900" max="2100">
                    </div>
                </div>
                <div class="form-group">
                    <label>Place of Birth</label>
                    <input type="text" id="ar-placeOfBirth">
                </div>
                <div class="form-group form-group--sm">
                    <label>Gender <span class="required">*</span></label>
                    <div id="ar-sex" class="radio-group" role="radiogroup" aria-label="Gender">
                        <label><input type="radio" name="ar-sex" value="0"> Male</label>
                        <label><input type="radio" name="ar-sex" value="1"> Female</label>
                    </div>
                </div>
                <div class="form-group form-group--sm">
                    <label>PWD/Senior <span class="required">*</span></label>
                    <select id="ar-sector">
                        <option value="0">No</option>
                        <option value="1">PWD</option>
                        <option value="2">Senior</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group form-group--sm">
                    <label>Civil Status <span class="required">*</span></label>
                    <select id="ar-civilStatus">
                        <option value="0">Single</option>
                        <option value="1">Married</option>
                        <option value="2">Widowed</option>
                        <option value="5">Separated</option>
                        <option value="6">Others</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Civil Status - Others</label>
                    <input type="text" id="ar-civilStatusOther">
                </div>
                <div class="form-group">
                    <label>Citizenship</label>
                    <input type="text" id="ar-citizenship">
                </div>
                <div class="form-group">
                    <label>Religion</label>
                    <input type="text" id="ar-religion">
                </div>
            </div>
            <div class="verification-grid">
                <div class="form-group">
                    <label>Proof Type <span class="required sector-verification-required">*</span></label>
                    <select id="ar-proofType">
                        <option value="">Select proof type</option>
                        <option value="PWD ID">PWD ID</option>
                        <option value="Senior Citizen ID">Senior Citizen ID</option>
                        <option value="Medical Certificate">Medical Certificate</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Proof / Reference Number <span class="required sector-verification-required">*</span></label>
                    <input type="text" id="ar-proofId">
                </div>
                <div class="form-group">
                    <label>Verification Status <span class="required sector-verification-required">*</span></label>
                    <select id="ar-verificationStatus">
                        <option value="Pending">Pending</option>
                        <option value="Verified">Verified</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Verified By</label>
                    <input type="text" id="ar-verifiedBy" readonly>
                </div>
                <div class="form-group">
                    <label>Verified Date</label>
                    <input type="text" id="ar-verifiedAt" readonly>
                </div>
            </div>
        </section>

        <section class="resident-form-section">
            <h3>Address</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>House Number/Street <span class="required">*</span></label>
                    <input type="text" id="ar-houseNumberStreet" required>
                </div>
                <div class="form-group">
                    <label>Purok/Zone</label>
                    <input type="text" id="ar-purokZone">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Barangay <span class="required">*</span></label>
                    <input type="text" id="ar-barangay" required>
                </div>
                <div class="form-group">
                    <label>Municipality/City <span class="required">*</span></label>
                    <input type="text" id="ar-municipalityCity" required>
                </div>
                <div class="form-group">
                    <label>Province <span class="required">*</span></label>
                    <input type="text" id="ar-province" required>
                </div>
            </div>
        </section>

        <section class="resident-form-section">
            <h3>Household Details</h3>
            <div class="form-row form-row--household">
                <div class="form-group form-group--sm">
                    <label>Household Role <span class="required">*</span></label>
                    <div id="ar-householdRole" class="radio-group" role="radiogroup" aria-label="Household Role">
                        <label><input type="radio" name="ar-householdRole" value="Head"> Head</label>
                        <label><input type="radio" name="ar-householdRole" value="Member"> Member</label>
                    </div>
                </div>
                <div class="form-group form-group--household-head">
                    <label>Name of Household Head</label>
                    <div class="household-head-search">
                        <input type="text" id="ar-householdHeadName" placeholder="Search existing resident head">
                        <button id="ar-householdHeadSearchBtn" class="ar-cancel-btn icon-btn icon-search" type="button">Search</button>
                    </div>
                    <div id="ar-householdHeadResults" class="household-head-results"></div>
                </div>
                <div class="form-group form-group--relationship">
                    <label>Relationship to Household Head <span class="required household-member-required">*</span></label>
                    <input type="text" id="ar-relationshipToHouseholdHead">
                </div>
            </div>
            <div class="form-group form-group--full">
                <label>Household Members</label>
                <input type="text" id="ar-householdMembers" placeholder="Optional notes; linked members can be added from the household head">
            </div>
        </section>

        <section class="resident-form-section">
            <h3>Employment/Education</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Occupation</label>
                    <input type="text" id="ar-occupation">
                </div>
                <div class="form-group">
                    <label>Employer/School</label>
                    <input type="text" id="ar-employerSchool">
                </div>
                <div class="form-group">
                    <label>Highest Educational Attainment</label>
                    <input type="text" id="ar-highestEducationalAttainment">
                </div>
            </div>
        </section>

        <section class="resident-form-section">
            <h3>Contact Information</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="ar-contact">
                </div>
                <div class="form-group">
                    <label>Email Address (if available)</label>
                    <input type="text" id="ar-email">
                </div>
            </div>
        </section>

        <section class="resident-form-section">
            <h3>Remarks</h3>
            <div class="form-group form-group--full">
                <label>Remarks</label>
                <input type="text" id="ar-remarks">
            </div>
        </section>

        <p id="ar-error" class="ar-error"></p>
        <div class="form-actions">
            <button class="ar-cancel-btn" type="button">Cancel</button>
            <button id="ar-saveBtn" type="submit">Save</button>
        </div>
    </form>
</div>
