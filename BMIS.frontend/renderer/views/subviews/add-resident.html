<div id="addResidentView">
    <div class="subview-heading">
        <span class="back-btn">&lt; Back</span>
        <div>
            <h2 id="addResident__header">Record of Barangay Inhabitants (Form C)</h2>
            <p class="form-reference">Barangay Inhabitants Record</p>
        </div>
    </div>
    <form id="addResidentForm" novalidate>
        <section class="resident-form-section">
            <h3>Barangay Inhabitants Record</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>First Name <span class="required">*</span></label>
                    <input type="text" id="ar-firstName" placeholder="Maria" required>
                </div>
                <div class="form-group">
                    <label>Middle Name <span class="required">*</span></label>
                    <input type="text" id="ar-middleName" placeholder="Decamora" required>
                </div>
                <div class="form-group">
                    <label>Surname <span class="required">*</span></label>
                    <input type="text" id="ar-lastName" placeholder="Dela Cruz" required>
                </div>
                <div class="form-group form-group--sm">
                    <label>Suffix</label>
                    <input type="text" id="ar-suffix" placeholder="III">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group form-group--birthdate">
                    <label>Date of Birth <span class="required">*</span></label>
                    <div class="birthdate-inputs">
                        <input type="number" id="ar-bday" placeholder="DD" min="1" max="31">
                        <select id="ar-bmonth">
                            <option value="1">Jan</option>
                            <option value="2">Feb</option>
                            <option value="3">Mar</option>
                            <option value="4">Apr</option>
                            <option value="5">May</option>
                            <option value="6">Jun</option>
                            <option value="7">Jul</option>
                            <option value="8">Aug</option>
                            <option value="9">Sep</option>
                            <option value="10">Oct</option>
                            <option value="11">Nov</option>
                            <option value="12">Dec</option>
                        </select>
                        <input type="number" id="ar-byear" placeholder="YYYY" min="1900" max="2100">
                    </div>
                </div>
                <div class="form-group">
                    <label>Place of Birth</label>
                    <input type="text" id="ar-placeOfBirth" placeholder="City/Municipality, Province">
                </div>
                <div class="form-group form-group--sm">
                    <label>Gender <span class="required">*</span></label>
                    <select id="ar-sex">
                        <option value="0">Male</option>
                        <option value="1">Female</option>
                    </select>
                </div>
                <div class="form-group form-group--sm">
                    <label>PWD/Senior <span class="required">*</span></label>
                    <select id="ar-sector">
                        <option value="0">No</option>
                        <option value="1">PWD</option>
                        <option value="2">Senior</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group form-group--sm">
                    <label>Civil Status <span class="required">*</span></label>
                    <select id="ar-civilStatus">
                        <option value="0">Single</option>
                        <option value="1">Married</option>
                        <option value="2">Widowed</option>
                        <option value="5">Separated</option>
                        <option value="6">Others</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Civil Status - Others</label>
                    <input type="text" id="ar-civilStatusOther" placeholder="Specify when Others is selected">
                </div>
                <div class="form-group">
                    <label>Citizenship</label>
                    <input type="text" id="ar-citizenship" value="Filipino">
                </div>
                <div class="form-group">
                    <label>Religion</label>
                    <input type="text" id="ar-religion">
                </div>
            </div>
            <div class="form-group form-group--full">
                <label>PWD/Senior Proof ID
                    <em>(required for PWD or Senior sector verification)</em>
                </label>
                <input type="text" id="ar-proofId" placeholder="PWD ID, senior citizen ID, or supporting reference">
            </div>
        </section>

        <section class="resident-form-section">
            <h3>Address</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>House Number/Street <span class="required">*</span></label>
                    <input type="text" id="ar-houseNumberStreet" placeholder="123 Block 67, Pipeline Street" required>
                </div>
                <div class="form-group">
                    <label>Purok/Zone</label>
                    <input type="text" id="ar-purokZone" placeholder="Zone 79">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Barangay <span class="required">*</span></label>
                    <input type="text" id="ar-barangay" value="Barangay 724" required>
                </div>
                <div class="form-group">
                    <label>Municipality/City <span class="required">*</span></label>
                    <input type="text" id="ar-municipalityCity" value="Manila" required>
                </div>
                <div class="form-group">
                    <label>Province <span class="required">*</span></label>
                    <input type="text" id="ar-province" value="Metro Manila" required>
                </div>
            </div>
        </section>

        <section class="resident-form-section">
            <h3>Household Details</h3>
            <div class="form-row">
                <div class="form-group form-group--sm">
                    <label>Household Role <span class="required">*</span></label>
                    <select id="ar-householdRole">
                        <option value="">Select role</option>
                        <option value="Head">Head</option>
                        <option value="Member">Member</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Name of Household Head</label>
                    <input type="text" id="ar-householdHeadName" placeholder="Required when resident is a member">
                </div>
                <div class="form-group">
                    <label>Relationship to Household Head</label>
                    <input type="text" id="ar-relationshipToHouseholdHead" placeholder="Self, spouse, child, sibling">
                </div>
            </div>
            <div class="form-group form-group--full">
                <label>Household Members</label>
                <input type="text" id="ar-householdMembers" placeholder="Required when resident is the head">
            </div>
        </section>

        <section class="resident-form-section">
            <h3>Employment/Education</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Occupation</label>
                    <input type="text" id="ar-occupation">
                </div>
                <div class="form-group">
                    <label>Employer/School</label>
                    <input type="text" id="ar-employerSchool">
                </div>
                <div class="form-group">
                    <label>Highest Educational Attainment</label>
                    <input type="text" id="ar-highestEducationalAttainment">
                </div>
            </div>
        </section>

        <section class="resident-form-section">
            <h3>Contact Information</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="ar-contact" placeholder="09171234567">
                </div>
                <div class="form-group">
                    <label>Email Address (if available)</label>
                    <input type="text" id="ar-email" placeholder="resident@example.com">
                </div>
            </div>
        </section>

        <section class="resident-form-section">
            <h3>Remarks</h3>
            <div class="form-group form-group--full">
                <label>Remarks</label>
                <input type="text" id="ar-remarks">
            </div>
        </section>

        <p id="ar-error" class="ar-error"></p>
        <div class="form-actions">
            <button class="ar-cancel-btn" type="button">Cancel</button>
            <button id="ar-saveBtn" type="submit">Save</button>
        </div>
    </form>
</div>
