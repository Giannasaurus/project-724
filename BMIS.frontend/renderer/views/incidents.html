<section id="incidentsView">
    <div class="incidents-heading">
        <div>
            <h2>Blotter & Cases</h2>
            <p>Record complaints and track barangay incidents.</p>
        </div>
    </div>

    <!-- Tab Navigation -->
    <div class="incident-tabs">
        <button class="incident-tab-btn active" data-tab="blotter-entry">Blotter Entry</button>
        <button class="incident-tab-btn" data-tab="case-records">Case Records</button>
    </div>

    <!-- Blotter Entry Tab -->
    <div id="blotter-entry" class="incident-tab-content active">
        <div class="incidents-layout">
            <form id="incidentForm" class="incident-form" novalidate>
                <div class="incident-grid">
                    <label class="incident-field">
                        <span>Complainant(s) <span class="required">*</span></span>
                        <div class="incident-search-wrap">
                            <input id="incidentComplainant" type="text" placeholder="Search residents..." required>
                            <div id="complainantResults" class="incident-search-results is-hidden"></div>
                        </div>
                        <div id="complainantTags" class="incident-tags"></div>
                    </label>

                    <label class="incident-field">
                        <span>Respondent(s) <span class="required">*</span></span>
                        <div class="incident-search-wrap">
                            <input id="incidentRespondent" type="text" placeholder="Search residents..." required>
                            <div id="respondentResults" class="incident-search-results is-hidden"></div>
                        </div>
                        <div id="respondentTags" class="incident-tags"></div>
                    </label>

                    <div class="incident-field incident-field--full">
                        <span>Nature of Case <span class="required">*</span></span>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="caseNature" value="civil" required>
                                <div class="radio-content">
                                    <span>Civil Case</span>
                                    <small>Property disputes, contracts, family matters</small>
                                </div>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="caseNature" value="criminal" required>
                                <div class="radio-content">
                                    <span>Criminal Case</span>
                                    <small>Theft, assault, disturbance of peace</small>
                                </div>
                            </label>
                        </div>
                    </div>

                    <label class="incident-field">
                        <span>Date & Time of Incident <span class="required">*</span></span>
                        <input id="incidentDateTime" type="datetime-local" required>
                    </label>

                    <label class="incident-field">
                        <span>Incident Location <span class="required">*</span></span>
                        <input id="incidentLocation" type="text" required>
                    </label>

                    <label class="incident-field incident-field--full">
                        <span>Summary of Incident <span class="required">*</span></span>
                        <textarea id="incidentNarrative" placeholder="Describe what happened..." required></textarea>
                    </label>
                </div>

                <div class="incident-actions">
                    <button class="incident-primary-btn icon-btn icon-generate" type="submit">Save Blotter Entry</button>
                </div>
            </form>

            <!-- Recent Entries Sidebar -->
            <section class="incident-recent-panel" aria-label="Recent blotter entries">
                <div class="incident-recent-panel__title">
                    <h3>Recent Entries</h3>
                </div>
                <div id="recentIncidentList" class="incident-recent-list"></div>
            </section>
        </div>
    </div>

    <!-- Case Records Tab -->
    <div id="case-records" class="incident-tab-content">
        <div class="case-records-container">
            <div class="case-records-search">
                <input id="caseRecordsSearch" type="text" placeholder="Search by complainant, respondent, or location...">
            </div>
            <div id="caseRecordsList" class="case-records-list"></div>
        </div>
    </div>
</section>
