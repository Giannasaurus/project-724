<section id="incidentsView">
    <div class="incidents-heading">
        <div>
            <h2>Blotter & Cases</h2>
            <p>Record complaints, verify resident parties, schedule hearings, and track barangay action.</p>
        </div>
    </div>

    <div class="incidents-layout">
        <form id="incidentForm" class="incident-form" novalidate>
            <div class="incident-grid">
                <label class="incident-field">
                    <span>Complainant <span class="required">*</span></span>
                    <input id="incidentComplainant" type="text" required>
                </label>
                <label class="incident-field">
                    <span>Complainant email</span>
                    <input id="incidentComplainantEmail" type="text">
                </label>
                <label class="incident-field">
                    <span>Respondent / complained resident <span class="required">*</span></span>
                    <input id="incidentRespondent" type="text" required>
                </label>
                <label class="incident-field">
                    <span>Respondent email</span>
                    <input id="incidentRespondentEmail" type="text">
                </label>
                <label class="incident-field">
                    <span>Incident location <span class="required">*</span></span>
                    <input id="incidentLocation" type="text" required>
                </label>
                <label class="incident-field">
                    <span>Hearing schedule</span>
                    <input id="incidentHearingSchedule" type="text" placeholder="Example: May 24, 2026 9:00 AM">
                </label>
                <label class="incident-field incident-field--full">
                    <span>Complaint / incident narrative <span class="required">*</span></span>
                    <textarea id="incidentNarrative" required></textarea>
                </label>
                <label class="incident-field incident-field--full">
                    <span>Action ng barangay</span>
                    <textarea id="incidentAction"></textarea>
                </label>
                <label class="incident-field incident-field--full">
                    <span>Resolution / outcome</span>
                    <textarea id="incidentResolution"></textarea>
                </label>
            </div>

            <p id="incidentVerificationStatus" class="incident-status" aria-live="polite"></p>
            <div class="incident-actions">
                <button id="verifyRespondentBtn" class="incident-secondary-btn" type="button">Verify respondent</button>
                <button class="incident-primary-btn" type="submit">Save case</button>
            </div>
        </form>

        <section class="incident-list-panel" aria-label="Saved blotter cases">
            <div class="incident-list-header">
                <h3>Saved cases</h3>
                <button id="clearIncidentFormBtn" class="incident-secondary-btn" type="button">Clear form</button>
            </div>
            <div id="incidentList" class="incident-list"></div>
        </section>
    </div>
</section>
