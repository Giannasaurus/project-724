<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Barangay 724 BIMS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body id="loginBody">
    <img src="../img/724-raw.jpg" alt="Barangay 724 logo">
    <h1>Barangay 724 <br> Malate, Manila <br> BIMS</h1>
    <form id="loginForm" action="" method="POST">
        
        <div id="inputContainer">
            <label for="usernameInput">Username</label>
            <input id="usernameInput" type="text" placeholder="Enter username" name="username" required>
            <label for="passwordInput">Password</label>
            <input id="passwordInput" type="password" placeholder="Enter password" name="password" required>
            
            <button id="loginButton" type="submit">Login</button>
        </div>
    </form>
    <script src="app.js"></script>
</body>
</html>
